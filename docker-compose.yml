version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agntly
      POSTGRES_PASSWORD: agntly
      POSTGRES_DB: agntly
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agntly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  escrow-engine:
    build:
      context: .
      dockerfile: services/escrow-engine/Dockerfile
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  registry-service:
    build:
      context: .
      dockerfile: services/registry-service/Dockerfile
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "3006:3006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  webhook-service:
    build:
      context: .
      dockerfile: services/webhook-service/Dockerfile
    ports:
      - "3007:3007"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  settlement-worker:
    build:
      context: .
      dockerfile: services/settlement-worker/Dockerfile
    ports:
      - "3008:3008"
    env_file: .env
    environment:
      - ESCROW_CONTRACT_ADDRESS=${ESCROW_CONTRACT_ADDRESS:-}
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY:-}
      - BASE_RPC_URL=${BASE_RPC_URL:-https://sepolia.base.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

name: Deploy to Sandbox

on:
  push:
    branches: [master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agntly
          POSTGRES_PASSWORD: agntly
          POSTGRES_DB: agntly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agntly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agntly/shared build
      - name: Run migrations
        run: psql -U agntly -h localhost -d agntly -f scripts/migrate.sql
        env:
          PGPASSWORD: agntly
      - name: Run integration tests
        run: ./node_modules/.bin/vitest run --config vitest.integration.config.ts
        env:
          DATABASE_URL: postgresql://agntly:agntly@localhost:5432/agntly
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          COMPLETION_TOKEN_SECRET: ci-test-completion-secret-at-least-32-chars
          NODE_ENV: test
      - name: Run SDK tests
        run: cd sdk/typescript && npx vitest run

  deploy:
    name: Deploy Sandbox
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AGNTLY_VM_HOST }}
          username: agntly
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            APP_DIR=/opt/agntly/sandbox

            # Clone or pull (preserve .env across fresh clones)
            if [ ! -d "$APP_DIR/.git" ]; then
              [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/.env.sandbox.bak
              rm -rf "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              [ -f /tmp/.env.sandbox.bak ] && cp /tmp/.env.sandbox.bak "$APP_DIR/.env" && rm /tmp/.env.sandbox.bak
            fi
            cd "$APP_DIR"
            git fetch origin master
            git checkout master
            git reset --hard origin/master

            # Install & build
            pnpm install --frozen-lockfile
            pnpm --filter @agntly/shared build
            pnpm --filter @agntly/wallet-service build 2>/dev/null || true

            # Build frontend (set -a exports all .env vars to child processes so NEXT_PUBLIC_* get baked in)
            set -a && . .env && set +a
            export AUTH_SERVICE_URL="http://localhost:4001"
            export REGISTRY_SERVICE_URL="http://localhost:4005"
            export NEXT_PUBLIC_APP_URL="https://sandbox.agntly.io"
            export NEXT_PUBLIC_APP_ENV="sandbox"
            cd frontend && rm -rf .next && ./node_modules/.bin/next build && cd ..

            # Migrations
            source .env 2>/dev/null || true
            psql "$DATABASE_URL" -f scripts/migrate.sql 2>/dev/null || true

            # Restart PM2 sandbox processes
            pm2 startOrRestart /opt/agntly/sandbox/ecosystem.sandbox.config.cjs --update-env
            sleep 5
            pm2 list

            echo "Sandbox deployed at $(date -u)"

name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh"
            export PM2_HOME="$HOME/.pm2"
            cd ~/agntly

            git checkout -- . 2>/dev/null || true
            git fetch origin
            git checkout production
            git pull origin production

            pnpm install --frozen-lockfile
            pnpm --filter @agntly/shared build
            pnpm --filter @agntly/wallet-service build 2>/dev/null || true

            # Stop frontend before rebuild
            pm2 stop frontend 2>/dev/null || true

            # Build frontend
            source .env
            export AUTH_SERVICE_URL="http://localhost:3001"
            export REGISTRY_SERVICE_URL="http://localhost:3005"
            export NEXT_PUBLIC_APP_URL="https://agntly.io"
            export NEXT_PUBLIC_APP_ENV="production"
            cd frontend && rm -rf .next && ./node_modules/.bin/next build && cd ..

            # Migrations
            source .env
            psql "$DATABASE_URL" -f scripts/migrate.sql 2>/dev/null || true

            # Restart all
            pm2 restart all --update-env
            sleep 5
            pm2 status

            echo "Production deployed successfully at $(date -u)"

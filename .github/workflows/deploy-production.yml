name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AGNTLY_VM_HOST }}
          username: agntly
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            APP_DIR=/opt/agntly/production

            # Clone or pull (preserve .env across fresh clones)
            if [ ! -d "$APP_DIR/.git" ]; then
              [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/.env.prod.bak
              rm -rf "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              [ -f /tmp/.env.prod.bak ] && cp /tmp/.env.prod.bak "$APP_DIR/.env" && rm /tmp/.env.prod.bak
            fi
            cd "$APP_DIR"
            git fetch origin production
            git checkout production
            git reset --hard origin/production

            # Install & build
            pnpm install --frozen-lockfile
            pnpm --filter @agntly/shared build
            pnpm --filter @agntly/wallet-service build 2>/dev/null || true

            # Build frontend (set -a exports all .env vars to child processes so NEXT_PUBLIC_* get baked in)
            set -a && . .env && set +a
            export AUTH_SERVICE_URL="http://localhost:3001"
            export REGISTRY_SERVICE_URL="http://localhost:3005"
            export NEXT_PUBLIC_APP_URL="https://agntly.io"
            export NEXT_PUBLIC_APP_ENV="production"
            cd frontend && rm -rf .next && ./node_modules/.bin/next build && cd ..

            # Migrations
            source .env 2>/dev/null || true
            psql "$DATABASE_URL" -f scripts/migrate.sql 2>/dev/null || true

            # Restart PM2 production processes
            pm2 startOrRestart /opt/agntly/production/ecosystem.production.config.cjs --update-env
            sleep 5
            pm2 list

            echo "Production deployed at $(date -u)"
